name: 午间大盘复盘

on:
  # 定时触发 - 每个工作日北京时间 11:35 (UTC 3:35)
  schedule:
    - cron: '35 3 * * 1-5'

  # 手动触发（用于测试）
  workflow_dispatch:

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 随机延迟（避免固定时间访问）
        run: sleep $((RANDOM % 30))

      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p data logs reports

      - name: 执行午间复盘（仅大盘）
        env:
          # === AI 模型：DeepSeek ===
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LLM_DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LLM_DEEPSEEK_BASE_URL: ${{ vars.LLM_DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          LLM_DEEPSEEK_MODELS: ${{ vars.LLM_DEEPSEEK_MODELS || 'deepseek-v4-flash' }}
          LLM_DEEPSEEK_ENABLED: ${{ vars.LLM_DEEPSEEK_ENABLED || 'true' }}
          LLM_CHANNELS: ${{ vars.LLM_CHANNELS || 'deepseek' }}

          # === 搜索服务 ===
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          SEARXNG_PUBLIC_INSTANCES_ENABLED: ${{ vars.SEARXNG_PUBLIC_INSTANCES_ENABLED || 'true' }}

          # === 通知渠道：飞书 ===
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

          # === 自选股 ===
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519,000858,601318,600036,000725,300750,002594,600276,601899,600900' }}
          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || 'cn' }}
          MARKET_REVIEW_ENABLED: 'true'

          # === 运行配置 ===
          REPORT_TYPE: ${{ vars.MIDDAY_REPORT_TYPE || 'brief' }}
          REPORT_LANGUAGE: ${{ vars.REPORT_LANGUAGE || 'zh' }}
          REPORT_SHOW_LLM_MODEL: 'false'
          ANALYSIS_DELAY: '0'
          TRADING_DAY_CHECK_ENABLED: 'true'
          MAX_WORKERS: '1'

          # === 系统 ===
          LOG_LEVEL: INFO
          REALTIME_SOURCE_PRIORITY: 'tencent,akshare_sina,efinance,akshare_em'

        run: |
          echo "=========================================="
          echo "📊 午间大盘复盘"
          echo "=========================================="
          echo "⏰ 时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 模式: 仅大盘复盘 (--market-review)"
          echo "📝 报告: 简要版 (brief)"
          echo ""
          python main.py --market-review

      - name: 显示运行结果
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 午间复盘完成"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "生成的报告:"
            ls -la reports/
          fi
